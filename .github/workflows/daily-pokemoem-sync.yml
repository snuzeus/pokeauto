name: Daily Pokemoem Data Sync

on:
  schedule:
    # 03:00 KST every day.
    - cron: "0 18 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Sync Pokemoem data
        run: npm run sync:pokemoem

      - name: Verify
        run: |
          npx tsc --noEmit
          npm test
          npm run build

      - name: Commit and push changes
        run: |
          if git diff --quiet -- data; then
            echo "No data changes to commit."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/master data/sample
          git commit -m "Update Pokemoem data"
          git push
